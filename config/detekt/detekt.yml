# Keep this file small and only override detekt defaults when the repo
# deliberately chooses a different rule setting.
naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
      - ConstructorLikeFunction

style:
  ReturnCount:
    max: 4
    excludeGuardClauses: true
  MagicNumber:
    ignoreAnnotated:
      - Preview
      - PreviewCombined
  ForbiddenComment:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    excludes:
      - "**/test/**"
      - "**/androidTest/**"

complexity:
  LongMethod:
    ignoreAnnotated:
      - PreviewCombined
  TooManyFunctions:
    allowedFunctionsPerClass: 15
    ignoreAnnotatedFunctions:
      - Preview

# Keep this file small and only override detekt defaults when the repo
# deliberately chooses a different rule setting.
naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
      - ConstructorLikeFunction

style:
  MagicNumber:
    ignoreAnnotated:
      - Preview
      - PreviewCombined
  ForbiddenComment:
    active: false

complexity:
  LongMethod:
    ignoreAnnotated:
      - PreviewCombined
  TooManyFunctions:
    ignoreAnnotatedFunctions:
      - Preview

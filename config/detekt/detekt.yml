# Keep this file small and only override detekt defaults when the repo
# deliberately chooses a different rule setting.
naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable

style:
  ForbiddenComment:
    active: false

complexity:
  LongMethod:
    ignoreAnnotated:
      - PreviewCombined
  TooManyFunctions:
    ignoreAnnotatedFunctions:
      - Preview
